<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>NexTech Admin - Quản trị hệ thống</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #1a234a;
        --danger: #d32f2f;
        --success: #2e7d32;
        --bg: #f4f7fe;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        margin: 0;
        display: flex;
      }
      .sidebar-admin {
        width: 260px;
        background: var(--primary);
        height: 100vh;
        color: white;
        position: fixed;
        z-index: 100;
      }
      .nav-item {
        padding: 15px 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.3s;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .nav-item.active {
        background: rgba(255, 255, 255, 0.1);
        color: #00d2ff;
        border-left: 4px solid #00d2ff;
      }
      .main-content {
        margin-left: 260px;
        padding: 30px;
        width: calc(100% - 260px);
      }
      .admin-card {
        background: #fff;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
      }
      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }
      th {
        background: #f8f9fa;
        color: #333;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 650px;
        max-height: 90vh;
        overflow-y: auto;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
      }
      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        color: white;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn-add {
        background: var(--success);
      }
      .btn-edit {
        background: #0288d1;
      }
      .btn-delete {
        background: var(--danger);
      }
      .btn-upload-manual {
        background: #666;
        color: white;
        cursor: pointer;
        padding: 9px 15px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
    </style>
  </head>
  <body>
    <div class="sidebar-admin">
      <h2
        style="padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1)"
      >
        NEXTECH CMS
      </h2>
      <div id="nav-product" class="nav-item" onclick="showTab('product-tab')">
        <i class="fas fa-box"></i> Sản phẩm
      </div>
      <div id="nav-user" class="nav-item" onclick="showTab('user-tab')">
        <i class="fas fa-users"></i> Khách hàng
      </div>
      <div id="nav-banner" class="nav-item" onclick="showTab('banner-tab')">
        <i class="fas fa-image"></i> Banner & Ads
      </div>
      <div class="nav-item" onclick="window.location.href = 'index.html'">
        <i class="fas fa-sign-out-alt"></i> Thoát
      </div>
    </div>

    <div class="main-content">
      <div id="product-tab" class="tab-content" style="display: none">
        <div class="admin-card">
          <h1>Quản lý Sản phẩm</h1>
          <button
            type="button"
            class="btn btn-add"
            onclick="openProductModal()"
          >
            <i class="fas fa-plus"></i> Đăng sản phẩm mới
          </button>
          <table>
            <thead>
              <tr>
                <th>Ảnh</th>
                <th>Tên sản phẩm</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="user-tab" class="tab-content" style="display: none">
        <div class="admin-card">
          <h1>Quản lý Khách hàng</h1>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>SĐT</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="banner-tab" class="tab-content" style="display: none">
        <div class="admin-card">
          <h1>Quản lý Banner & Quảng cáo</h1>
          <div
            class="form-group"
            style="
              background: #f8faff;
              padding: 25px;
              border-radius: 12px;
              border: 1px solid #dce4f5;
            "
          >
            <h3 style="margin-top: 0">Thêm Banner mới</h3>
            <label>Link hình ảnh (Dán link hoặc bấm tải ảnh)</label>
            <div style="display: flex; gap: 10px; margin-bottom: 15px">
              <input
                type="text"
                id="b_img"
                placeholder="Link ảnh sẽ hiện ở đây..."
              />
              <input
                type="file"
                id="b_file"
                style="display: none"
                onchange="handleBannerUpload(event)"
              />
              <label for="b_file" class="btn-upload-manual"
                ><i class="fas fa-cloud-upload-alt"></i> Tải ảnh lên</label
              >
            </div>
            <label>Vị trí hiển thị trên Web</label>
            <select id="b_pos" style="margin-bottom: 15px">
              <option value="banner_slider">Slider chính (Trang chủ)</option>
              <option value="ad_monitor">Quảng cáo Màn hình</option>
              <option value="ad_deal">Quảng cáo Hot Deal</option>
              <option value="ad_laptop">Quảng cáo Laptop</option>
              <option value="ad_phimco_1">Quảng cáo Bàn phím 1</option>
              <option value="ad_phimco_2">Quảng cáo Bàn phím 2</option>
              <option value="ad_bottom_3">Banner chân trang 1</option>
              <option value="ad_bottom_4">Banner chân trang 2</option>
            </select>
            <button
              type="button"
              class="btn btn-add"
              style="width: 100%; padding: 12px; justify-content: center"
              onclick="saveBanner(event)"
            >
              <i class="fas fa-save"></i> LƯU VÀO CƠ SỞ DỮ LIỆU
            </button>
          </div>
          <table>
            <thead>
              <tr>
                <th>Ảnh xem trước</th>
                <th>Vị trí</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="bannerTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="productModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle">Đăng sản phẩm</h2>
        <div class="form-group">
          <label>Tên sản phẩm</label><input type="text" id="p_name" />
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
          <div class="form-group">
            <label>Danh mục</label>
            <select id="p_category" onchange="generateSpecsUI()">
              <option value="Iphone">iPhone</option>
              <option value="SamSung">Samsung</option>
              <option value="Laptop DELL">Laptop Dell</option>
              <option value="CPU">CPU</option>
              <option value="Bàn Phím">Bàn phím</option>
              <option value="RAM">RAM</option>
              <option value="Màn hình ASUS">Màn hình ASUS</option>
            </select>
          </div>
          <div class="form-group">
            <label>Giá bán (VNĐ)</label><input type="number" id="p_price" />
          </div>
        </div>
        <div class="form-group">
          <label>Giá gốc</label><input type="number" id="p_old_price" />
        </div>
        <div class="form-group">
          <label>Hình ảnh sản phẩm</label>
          <div style="display: flex; gap: 10px">
            <input type="text" id="p_img" placeholder="Link ảnh..." />
            <input
              type="file"
              id="file_picker"
              style="display: none"
              onchange="uploadProductImage(event)"
            />
            <label for="file_picker" class="btn-upload-manual">Chọn file</label>
          </div>
        </div>
        <div class="form-group">
          <label style="color: var(--danger)">THÔNG SỐ KỸ THUẬT</label>
          <div
            id="dynamicSpecsUI"
            style="
              background: #f9f9f9;
              padding: 15px;
              border-radius: 8px;
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 10px;
            "
          ></div>
        </div>
        <div class="form-group">
          <label>Mô tả chi tiết</label
          ><textarea id="p_desc" rows="4"></textarea>
        </div>
        <div style="text-align: right; margin-top: 20px">
          <button
            type="button"
            class="btn"
            style="background: #ccc; color: #333"
            onclick="closeProductModal()"
          >
            Đóng
          </button>
          <button
            type="button"
            class="btn btn-add"
            onclick="saveProduct(event)"
          >
            HOÀN TẤT ĐĂNG
          </button>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      let editingId = null;

      // HÀM CHUYỂN TAB (Ghi nhớ tab bằng localStorage)
      function showTab(id) {
        localStorage.setItem("admin_active_tab", id);
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => (t.style.display = "none"));
        document
          .querySelectorAll(".nav-item")
          .forEach((i) => i.classList.remove("active"));

        const targetTab = document.getElementById(id);
        if (targetTab) targetTab.style.display = "block";

        const navId = "nav-" + id.replace("-tab", "");
        const navBtn = document.getElementById(navId);
        if (navBtn) navBtn.classList.add("active");

        if (id === "product-tab") fetchProducts();
        if (id === "user-tab") fetchUsers();
        if (id === "banner-tab") fetchBanners();
      }

      // --- LOGIC BANNER (PHIÊN BẢN CHỐNG RELOAD) ---
      async function fetchBanners() {
        const res = await fetch("http://127.0.0.1:5000/api/public/banners");
        const data = await res.json();
        document.getElementById("bannerTableBody").innerHTML = data
          .map(
            (b) => `
          <tr>
            <td><img src="${b.img}" width="150" style="border-radius:4px; border:1px solid #ddd"></td>
            <td><span class="btn" style="background:#eee; color:#333; font-size:11px">${b.position}</span></td>
            <td><button type="button" class="btn btn-delete" onclick="deleteBanner(${b.id})"><i class="fas fa-trash"></i> Xóa</button></td>
          </tr>`,
          )
          .join("");
      }

      async function handleBannerUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const fd = new FormData();
        fd.append("file", file);

        try {
          const res = await fetch("http://127.0.0.1:5000/admin/upload", {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            body: fd,
          });
          const data = await res.json();
          if (res.ok) {
            // LƯU LINK VÀO LOCALSTORAGE (KỂ CẢ RELOAD CŨNG KHÔNG MẤT)
            localStorage.setItem("temp_banner_url", data.url);
            document.getElementById("b_img").value = data.url;
            alert(
              "Tải ảnh xong! Link đã được bảo vệ. Hãy bấm 'LƯU VÀO CƠ SỞ DỮ LIỆU'.",
            );
          }
        } catch (err) {
          alert("Lỗi upload!");
        }
      }

      async function saveBanner(e) {
        if (e) e.preventDefault();

        // Ưu tiên lấy từ ô input, nếu rỗng thì lấy từ bộ nhớ tạm localStorage
        let imgUrl = document.getElementById("b_img").value.trim();
        if (!imgUrl) {
          imgUrl = localStorage.getItem("temp_banner_url");
        }

        const pos = document.getElementById("b_pos").value;

        if (!imgUrl) {
          alert("Bạn chưa tải ảnh lên!");
          return;
        }

        try {
          const res = await fetch("http://127.0.0.1:5000/admin/banners/add", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ img: imgUrl, position: pos }),
          });
          if (res.ok) {
            alert("Đã lưu vào CSDL!");
            document.getElementById("b_img").value = "";
            localStorage.removeItem("temp_banner_url"); // Lưu xong thì xóa bộ nhớ tạm
            fetchBanners();
          }
        } catch (err) {
          alert("Lỗi khi lưu!");
        }
      }

      async function deleteBanner(id) {
        if (!confirm("Xóa banner này?")) return;
        await fetch(`http://127.0.0.1:5000/admin/banners/delete/${id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` },
        });
        fetchBanners();
      }

      // --- CÁC HÀM KHÁC (GIỮ NGUYÊN) ---
      async function fetchProducts() {
        const res = await fetch("http://127.0.0.1:5000/api/public/products");
        const data = await res.json();
        let html = "";
        for (let cat in data) {
          data[cat].forEach((p) => {
            html += `<tr><td><img src="${p.img}" width="40" style="border-radius:4px"></td><td>${p.name}</td>
              <td><button type="button" class="btn btn-edit" onclick="editProduct(${p.id})">Sửa</button>
              <button type="button" class="btn btn-delete" onclick="deleteProduct(${p.id})">Xóa</button></td></tr>`;
          });
        }
        document.getElementById("productTableBody").innerHTML = html;
      }
      async function deleteProduct(id) {
        if (!confirm("Xóa sản phẩm?")) return;
        await fetch(`http://127.0.0.1:5000/admin/products/delete/${id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` },
        });
        fetchProducts();
      }
      async function fetchUsers() {
        const res = await fetch("http://127.0.0.1:5000/admin/users", {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        document.getElementById("userTableBody").innerHTML = data
          .map(
            (u) => `
            <tr>
                <td>#${u.id}</td><td>${u.username}</td><td>${u.email || "N/A"}</td><td>${u.phone || "N/A"}</td>
                <td style="color:${u.is_locked ? "red" : "green"}; font-weight: bold;">${u.is_locked ? "Đang khóa" : "Hoạt động"}</td>
                <td>
                    <button type="button" class="btn" style="background-color: ${u.is_locked ? "#2e7d32" : "#ed6c02"}" onclick="toggleLock(${u.id})">${u.is_locked ? "Mở khóa" : "Khóa"}</button>
                    <button type="button" class="btn btn-delete" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`,
          )
          .join("");
      }
      async function toggleLock(id) {
        await fetch(`http://127.0.0.1:5000/admin/users/toggle-lock/${id}`, {
          method: "PUT",
          headers: { Authorization: `Bearer ${token}` },
        });
        fetchUsers();
      }
      async function deleteUser(id) {
        if (!confirm("Xóa?")) return;
        await fetch(`http://127.0.0.1:5000/admin/users/delete/${id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` },
        });
        fetchUsers();
      }
      const specMaps = {
        Iphone: ["Màn hình", "Chip", "RAM", "Pin"],
        SamSung: ["Màn hình", "Chip", "AI"],
        CPU: ["Nhân", "Luồng"],
        "Laptop DELL": ["CPU", "RAM", "SSD"],
        "Bàn Phím": ["Kết nối", "Switch"],
        RAM: ["Bus", "Dung lượng"],
        "Màn hình ASUS": ["Hz", "Kích thước"],
      };
      function generateSpecsUI() {
        const cat = document.getElementById("p_category").value;
        document.getElementById("dynamicSpecsUI").innerHTML = (
          specMaps[cat] || ["Thông số"]
        )
          .map(
            (f) =>
              `<div><small>${f}</small><input type="text" class="spec-val" data-label="${f}"></div>`,
          )
          .join("");
      }
      async function uploadProductImage(e) {
        const fd = new FormData();
        fd.append("file", e.target.files[0]);
        const res = await fetch("http://127.0.0.1:5000/admin/upload", {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          body: fd,
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById("p_img").value = data.url;
          alert("Tải ảnh sản phẩm!");
        }
      }
      async function saveProduct(e) {
        if (e) e.preventDefault();
        const specs = {};
        document
          .querySelectorAll("#dynamicSpecsUI .spec-val")
          .forEach((i) => (specs[i.dataset.label] = i.value));
        const body = {
          name: document.getElementById("p_name").value,
          category: document.getElementById("p_category").value,
          price: document.getElementById("p_price").value,
          old_price: document.getElementById("p_old_price").value,
          img: document.getElementById("p_img").value,
          specs: specs,
          description: document.getElementById("p_desc").value,
        };
        const url = editingId
          ? `http://127.0.0.1:5000/admin/products/update/${editingId}`
          : "http://127.0.0.1:5000/admin/products/add";
        const res = await fetch(url, {
          method: editingId ? "PUT" : "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          alert("Thành công!");
          closeProductModal();
          fetchProducts();
        }
      }
      async function editProduct(id) {
        editingId = id;
        document.getElementById("modalTitle").innerText = "Sửa sản phẩm";
        const res = await fetch("http://127.0.0.1:5000/api/public/products");
        const data = await res.json();
        let p = Object.values(data)
          .flat()
          .find((x) => x.id === id);
        if (p) {
          document.getElementById("p_name").value = p.name;
          document.getElementById("p_category").value = p.category;
          document.getElementById("p_price").value = p.price;
          document.getElementById("p_old_price").value = p.oldPrice || 0;
          document.getElementById("p_img").value = p.img;
          document.getElementById("p_desc").value = p.description;
          document.getElementById("productModal").style.display = "flex";
          generateSpecsUI();
          setTimeout(() => {
            document
              .querySelectorAll("#dynamicSpecsUI .spec-val")
              .forEach((i) => (i.value = p.specs[i.dataset.label] || ""));
          }, 200);
        }
      }
      function openProductModal() {
        editingId = null;
        document.getElementById("modalTitle").innerText = "Đăng sản phẩm";
        document.getElementById("productModal").style.display = "flex";
        generateSpecsUI();
      }
      function closeProductModal() {
        document.getElementById("productModal").style.display = "none";
      }

      // KHỞI CHẠY (Ưu tiên tab cũ)
      const lastTab = localStorage.getItem("admin_active_tab") || "product-tab";
      showTab(lastTab);

      // Kiểm tra nếu có link ảnh cũ trong bộ nhớ
      if (localStorage.getItem("temp_banner_url")) {
        document.getElementById("b_img").value =
          localStorage.getItem("temp_banner_url");
      }
    </script>
  </body>
</html>

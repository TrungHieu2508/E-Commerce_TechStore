<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTech Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="../assets/img/LOGO1.png" type="image/x-icon"> 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Logo NexTech */
        .logo {
            margin-bottom: 20px;
        }
        .logo img {
            max-width: 280px;
            height: auto;
        }

        /* Tiêu đề */
        h2 {
            font-size: 28px;
            font-weight: 700;
            text-align: left;
            margin-bottom: 25px;
        }

        /* Form styling */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            color: #333;
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        /* Quên mật khẩu */
        .forgot-password {
            display: block;
            text-align: right;
            color: #FF5A36;
            text-decoration: none;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Nút đăng nhập chính */
        .btn-login {
            background-color: #5D87FF;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            margin: 25px 0;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #4b6fd6;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            color: #777;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
            margin: 0 10px;
        }

        /* Social buttons */
        .social-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .google { background-color: #D14836; }
        .facebook { background-color: #4267B2; }

        .social-btn i {
            margin-right: 8px;
            font-size: 18px;
        }

        /* Footer */
        .footer-line {
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-size: 14px;
            color: #333;
        }

        .register-link {
            color: #5D87FF;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <a href="./index.html">
                <img src="../assets/img/Logo_white.png" alt="NexTech Logo">
            </a>
        </div>

        <h2>Đăng nhập</h2>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input id="emailInput" type="text" placeholder="User Name" required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input id="passwordInput" type="password" placeholder="Password" required>
                <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <div class="divider">hoặc đăng nhập bằng</div>

        <div class="social-buttons">
            <button class="social-btn google">
                <i class="fab fa-google-plus-g"></i> Google
            </button>
            <button class="social-btn facebook">
                <i class="fab fa-facebook-f"></i> Facebook
            </button>
        </div>

        <div class="footer-line">
            Bạn chưa có tài khoản? <a href="register.html" class="register-link">Đăng ký ngay!</a>
        </div>
    </div>

</body>
<script>
    (function () {
        var form = document.getElementById("loginForm");
        var emailInput = document.getElementById("emailInput");
        var passwordInput = document.getElementById("passwordInput");

        if (!form) return;

        form.addEventListener("submit", async function (event) {
            event.preventDefault();

            var username = emailInput.value.trim();
            var password = passwordInput.value;

            try {
                var response = await fetch("http://localhost:5000/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password
                    })
                });

                var data = await response.json();

                if (response.ok) {
                    localStorage.setItem("nextech_auth", JSON.stringify({
                        access_token: data.access_token,
                        role: data.role,
                        username: data.username,
                        loggedInAt: new Date().toISOString()
                    }));

                    if (data.role === "admin") {
                        window.location.href = "./admin/dashboard.html";
                    } else {
                        window.location.href = "./index.html";
                    }
                } else {
                    alert(data.msg || "Đăng nhập thất bại");
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Không thể kết nối tới máy chủ");
            }
        });
    })();
</script>
</html>
